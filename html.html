<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>HTML转义/反转义 - gtaxq 工具站</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* 全局盒模型 — 完全沿用原框架 */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 50px 10px;
    background: #f5f5f5;
}
.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
textarea {
    width: 100%;
    max-width: 100%;
    height: 150px;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 16px;
    resize: vertical;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: monospace;
}
textarea[readonly] {
    background-color: #f0f0f0;
    color: #333;
    cursor: default;
}
button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: #e0e0e0;
    transition: background 0.2s;
}
button:hover {
    background-color: #d0d0d0;
}
button.primary {
    background-color: #4a90e2;
    color: white;
}
button.primary:hover {
    background-color: #357abd;
}
h1 {
    margin-bottom: 20px;
    font-size: 1.8rem;
}
.actions {
    margin: 15px 0 10px;
}
.note {
    font-size: 0.85rem;
    color: #666;
    margin: 8px 0 5px;
    text-align: left;
    background: #f9f9f9;
    padding: 8px;
    border-radius: 4px;
}
.radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin: 10px 0;
    justify-content: center;
}
.radio-group label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    background: #f2f2f2;
    padding: 6px 15px;
    border-radius: 20px;
}
.radio-group input[type="radio"] {
    margin: 0;
    cursor: pointer;
}
.example-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 10px 0;
}
.example-buttons button {
    padding: 5px 10px;
    font-size: 14px;
    background-color: #f2f2f2;
}
</style>
</head>
<body>

<div class="container">
    <h1>🔤 HTML 转义/反转义</h1>
    
    <!-- 输入区域 - 移除会导致自动弹窗的示例内容 -->
    <textarea id="inputText" placeholder="输入需要转义或反转义的 HTML 内容...">&lt;div&gt;Hello &amp; welcome&lt;/div&gt;</textarea>

    <!-- 模式选择 -->
    <div class="radio-group">
        <label>
            <input type="radio" name="mode" value="escape" checked> 转义 (实体编码)
        </label>
        <label>
            <input type="radio" name="mode" value="unescape"> 反转义 (实体解码)
        </label>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
        <button class="primary" onclick="processHTML()">⚡ 执行</button>
        <button onclick="swapText()">⇅ 上下互换</button>
        <button onclick="clearAll()">🗑️ 清空</button>
    </div>

    <!-- 快捷示例按钮 - 移除会触发弹窗的XSS示例 -->
    <div class="example-buttons">
        <button onclick="loadExample('basic')">基础示例</button>
        <button onclick="loadExample('html')">HTML标签</button>
        <button onclick="loadExample('chinese')">中文符号</button>
        <button onclick="loadExample('emoji')">Emoji表情</button>
        <button onclick="loadExample('entities')">实体示例</button>
    </div>

    <!-- 输出区域 -->
    <textarea id="outputText" placeholder="结果会显示在这里..." readonly></textarea>

    <div class="note">
        <strong>📌 说明：</strong><br>
        • 转义：将 HTML 特殊字符 &lt;, &gt;, &amp;, &quot;, &#39; 转换为 HTML 实体<br>
        • 反转义：将 HTML 实体还原为原始字符<br>
        • 支持所有命名实体 (如 &amp;nbsp;) 和 数字实体 (如 &amp;#123;)<br>
        • 常用于防止 XSS 攻击、显示 HTML 代码等场景<br>
        • 点击示例按钮可快速填充测试内容（已移除自动弹窗的代码）
    </div>
</div>

<script>
(function() {
    // DOM 元素
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const modeRadios = document.getElementsByName('mode');

    // HTML 转义函数 (转义特殊字符)
    function escapeHTML(str) {
        if (!str) return '';
        
        // 替换特殊字符为 HTML 实体
        return str
            .replace(/&/g, '&amp;')      // & 必须第一个替换，避免重复转义
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;')      // 使用 &#39; 而不是 &apos; (部分浏览器不支持 &apos;)
            .replace(/\//g, '&#47;')      // 可选的，转义斜杠
            .replace(/=/g, '&#61;');      // 可选的，转义等号
    }

    // HTML 反转义函数 (将实体还原为字符)
    function unescapeHTML(str) {
        if (!str) return '';
        
        // 创建一个临时 DOM 元素，利用浏览器能力进行反转义
        const textarea = document.createElement('textarea');
        textarea.innerHTML = str;
        return textarea.value;
    }

    // 核心处理函数
    function processHTML() {
        const text = inputText.value;
        if (text === '') {
            outputText.value = '(请输入内容)';
            return;
        }

        // 获取选中的模式
        let mode = 'escape';
        for (let radio of modeRadios) {
            if (radio.checked) {
                mode = radio.value;
                break;
            }
        }

        try {
            let result = '';
            if (mode === 'escape') {
                result = escapeHTML(text);
            } else {
                result = unescapeHTML(text);
            }
            outputText.value = result;
        } catch (e) {
            outputText.value = '处理失败：' + e.message;
        }
    }

    // 交换输入输出
    function swapText() {
        const output = outputText.value;
        if (output && !output.includes('(请输入内容)') && !output.includes('处理失败')) {
            inputText.value = output;
            outputText.value = '';
        }
    }

    // 清空输入输出
    function clearAll() {
        inputText.value = '';
        outputText.value = '';
    }

    // 加载示例 - 移除了会导致弹窗的XSS代码
    function loadExample(type) {
        switch(type) {
            case 'basic':
                inputText.value = '<div>Hello & welcome</div>\n<p>This is a "quote" and \'apostrophe\'</p>';
                break;
            case 'html':
                inputText.value = '<div class="container">\n  <h1>标题</h1>\n  <p>段落内容 & 特殊字符</p>\n</div>';
                break;
            case 'chinese':
                inputText.value = '<标签> 中文符号："引号"、\'撇号\'、&与符号、<小于号>大于号';
                break;
            case 'emoji':
                inputText.value = '表情符号：😀 😎 👍 🏆\n特殊符号：© ® ™ € £ ¥';
                break;
            case 'entities':
                inputText.value = '&lt;div&gt;&amp;nbsp;&lt;/div&gt;\n&amp;copy; 2024 &amp;reg; Company';
                break;
        }
        // 自动执行当前选中的模式
        processHTML();
    }

    // 暴露全局方法
    window.processHTML = processHTML;
    window.swapText = swapText;
    window.clearAll = clearAll;
    window.loadExample = loadExample;

    // 页面加载后执行一次示例
    window.addEventListener('DOMContentLoaded', () => {
        // 确保输入框有安全的示例内容
        if (!inputText.value.trim()) {
            loadExample('basic');
        } else {
            processHTML();
        }
    });

})();
</script>

<!-- 继承原框架风格，增加HTML转义/反转义功能 - 已修复弹窗问题 -->
</body>
</html>
