<script>
(function() {
    // DOM 元素
    const colorPreview = document.getElementById('colorPreview');
    const hexInput = document.getElementById('hexInput');
    const colorPicker = document.getElementById('colorPicker');
    const redInput = document.getElementById('redInput');
    const greenInput = document.getElementById('greenInput');
    const blueInput = document.getElementById('blueInput');
    const hueInput = document.getElementById('hueInput');
    const saturationInput = document.getElementById('saturationInput');
    const lightnessInput = document.getElementById('lightnessInput');
    const resultHex = document.getElementById('resultHex');
    const resultRgb = document.getElementById('resultRgb');
    const resultHsl = document.getElementById('resultHsl');
    const resultHsv = document.getElementById('resultHsv');
    const hexBtn = document.getElementById('hexBtn');
    const rgbBtn = document.getElementById('rgbBtn');
    const hslBtn = document.getElementById('hslBtn');
    const hexInputs = document.getElementById('hexInputs');
    const rgbInputs = document.getElementById('rgbInputs');
    const hslInputs = document.getElementById('hslInputs');
    const copySuccess = document.getElementById('copySuccess');
    
    // 调色板元素
    const presetGrid = document.getElementById('presetGrid');
    const customGrid = document.getElementById('customGrid');
    const colorHistory = document.getElementById('colorHistory');
    const presetPalette = document.getElementById('presetPalette');
    const customPalette = document.getElementById('customPalette');

    // 当前活动格式
    let currentFormat = 'hex';
    
    // 预设色卡数据
    const presetColors = [
        '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEEAD',
        '#D4A5A5', '#9B59B6', '#3498DB', '#E67E22', '#2ECC71',
        '#E74C3C', '#F1C40F', '#1ABC9C', '#E84C3D', '#3498DB',
        '#9B59B6', '#34495E', '#F39C12', '#27AE60', '#16A085',
        '#8E44AD', '#2C3E50', '#D35400', '#C0392B', '#7F8C8D'
    ];
    
    // 自定义色板数据 (从localStorage加载)
    let customColors = [];
    
    // 颜色历史数据 (从localStorage加载)
    let historyColors = [];

    // 初始化
    function init() {
        loadFromStorage();
        renderPresetPalette();
        renderCustomPalette();
        renderHistory();
        
        // 颜色选择器变化
        colorPicker.addEventListener('input', (e) => {
            hexInput.value = e.target.value;
            updateFromHex(e.target.value);
        });

        // HEX 输入变化
        hexInput.addEventListener('input', (e) => {
            let val = e.target.value;
            if (!val.startsWith('#')) {
                val = '#' + val;
            }
            if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
                colorPicker.value = val;
                updateFromHex(val);
            }
        });

        // RGB 输入变化
        [redInput, greenInput, blueInput].forEach(input => {
            input.addEventListener('input', () => {
                if (currentFormat === 'rgb') {
                    updateFromRgb();
                }
            });
        });

        // HSL 输入变化
        [hueInput, saturationInput, lightnessInput].forEach(input => {
            input.addEventListener('input', () => {
                if (currentFormat === 'hsl') {
                    updateFromHsl();
                }
            });
        });
    }

    // 从localStorage加载数据
    function loadFromStorage() {
        try {
            const savedCustom = localStorage.getItem('gtaxq_custom_palette');
            if (savedCustom) {
                customColors = JSON.parse(savedCustom);
            }
            
            const savedHistory = localStorage.getItem('gtaxq_color_history');
            if (savedHistory) {
                historyColors = JSON.parse(savedHistory);
            }
        } catch (e) {
            console.log('加载存储失败', e);
        }
    }

    // 保存到localStorage
    function saveToStorage() {
        localStorage.setItem('gtaxq_custom_palette', JSON.stringify(customColors));
        localStorage.setItem('gtaxq_color_history', JSON.stringify(historyColors));
    }

    // 渲染预设色卡
    function renderPresetPalette() {
        presetGrid.innerHTML = '';
        presetColors.forEach(color => {
            const item = createPaletteItem(color);
            presetGrid.appendChild(item);
        });
    }

    // 渲染自定义色板
    function renderCustomPalette() {
        customGrid.innerHTML = '';
        if (customColors.length === 0) {
            customGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 20px; color: #999;">暂无颜色，点击"添加到调色板"添加</div>';
        } else {
            customColors.forEach((color, index) => {
                const item = createPaletteItem(color, true, index);
                customGrid.appendChild(item);
            });
        }
    }

    // 创建调色板项
    function createPaletteItem(color, isCustom = false, index = null) {
        const div = document.createElement('div');
        div.className = 'palette-item';
        div.style.backgroundColor = color;
        
        const hexSpan = document.createElement('span');
        hexSpan.className = 'color-hex';
        hexSpan.textContent = color;
        div.appendChild(hexSpan);
        
        div.addEventListener('click', () => {
            selectColor(color);
            addToHistory(color);
        });
        
        if (isCustom) {
            // 添加删除按钮
            const deleteBtn = document.createElement('span');
            deleteBtn.style.position = 'absolute';
            deleteBtn.style.top = '2px';
            deleteBtn.style.right = '2px';
            deleteBtn.style.background = 'rgba(255,255,255,0.8)';
            deleteBtn.style.borderRadius = '50%';
            deleteBtn.style.width = '16px';
            deleteBtn.style.height = '16px';
            deleteBtn.style.textAlign = 'center';
            deleteBtn.style.lineHeight = '14px';
            deleteBtn.style.cursor = 'pointer';
            deleteBtn.style.fontSize = '12px';
            deleteBtn.innerHTML = '×';
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                removeCustomColor(index);
            };
            div.appendChild(deleteBtn);
        }
        
        return div;
    }

    // 选择颜色
    function selectColor(color) {
        hexInput.value = color;
        colorPicker.value = color;
        updateFromHex(color);
    }

    // 添加到历史记录
    function addToHistory(color) {
        // 移除重复
        historyColors = historyColors.filter(c => c !== color);
        // 添加到开头
        historyColors.unshift(color);
        // 限制长度
        if (historyColors.length > 12) {
            historyColors = historyColors.slice(0, 12);
        }
        renderHistory();
        saveToStorage();
    }

    // 渲染历史记录
    function renderHistory() {
        colorHistory.innerHTML = '';
        if (historyColors.length === 0) {
            colorHistory.innerHTML = '<div style="color: #999; width: 100%; text-align: center;">暂无历史记录</div>';
        } else {
            historyColors.forEach(color => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.style.backgroundColor = color;
                div.title = color;
                div.addEventListener('click', () => selectColor(color));
                colorHistory.appendChild(div);
            });
        }
    }

    // 添加到自定义色板
    function addToPalette() {
        const currentHex = resultHex.value;
        if (!customColors.includes(currentHex)) {
            customColors.push(currentHex);
            renderCustomPalette();
            saveToStorage();
        }
    }

    // 移除自定义颜色
    function removeCustomColor(index) {
        customColors.splice(index, 1);
        renderCustomPalette();
        saveToStorage();
    }

    // 清空自定义色板
    function clearPalette() {
        if (confirm('确定清空自定义色板吗？')) {
            customColors = [];
            renderCustomPalette();
            saveToStorage();
        }
    }

    // 清空历史记录
    function clearHistory() {
        historyColors = [];
        renderHistory();
        saveToStorage();
    }

    // 导出调色板
    function exportPalette() {
        const data = JSON.stringify(customColors, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'gtaxq_palette.json';
        a.click();
    }

    // 导入调色板
    function importPalette() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const colors = JSON.parse(e.target.result);
                    if (Array.isArray(colors)) {
                        customColors = colors;
                        renderCustomPalette();
                        saveToStorage();
                    }
                } catch (err) {
                    alert('导入失败：无效的格式');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    // 切换调色板标签
    function switchPaletteTab(tab) {
        const tabs = document.querySelectorAll('.palette-tab');
        tabs.forEach(t => t.classList.remove('active'));
        
        if (tab === 'preset') {
            tabs[0].classList.add('active');
            presetPalette.style.display = 'block';
            customPalette.style.display = 'none';
        } else {
            tabs[1].classList.add('active');
            presetPalette.style.display = 'none';
            customPalette.style.display = 'block';
        }
    }

    // 设置当前输入格式
    function setFormat(format) {
        currentFormat = format;
        
        [hexBtn, rgbBtn, hslBtn].forEach(btn => btn.classList.remove('active'));
        document.getElementById(format + 'Btn').classList.add('active');
        
        hexInputs.style.display = format === 'hex' ? 'block' : 'none';
        rgbInputs.style.display = format === 'rgb' ? 'block' : 'none';
        hslInputs.style.display = format === 'hsl' ? 'block' : 'none';
    }

    // 从当前输入更新
    function updateFromCurrent() {
        switch(currentFormat) {
            case 'hex':
                updateFromHex(hexInput.value);
                break;
            case 'rgb':
                updateFromRgb();
                break;
            case 'hsl':
                updateFromHsl();
                break;
        }
    }

    // 从 HEX 更新
    function updateFromHex(hex) {
        let cleanHex = hex.replace('#', '');
        if (cleanHex.length === 3) {
            cleanHex = cleanHex.split('').map(c => c + c).join('');
        }
        if (cleanHex.length === 6) {
            const r = parseInt(cleanHex.substr(0, 2), 16);
            const g = parseInt(cleanHex.substr(2, 2), 16);
            const b = parseInt(cleanHex.substr(4, 2), 16);
            updateAllFormats(r, g, b);
        }
    }

    // 从 RGB 更新
    function updateFromRgb() {
        const r = parseInt(redInput.value) || 0;
        const g = parseInt(greenInput.value) || 0;
        const b = parseInt(blueInput.value) || 0;
        
        const clamp = (val) => Math.min(255, Math.max(0, val));
        updateAllFormats(clamp(r), clamp(g), clamp(b));
    }

    // 从 HSL 更新
    function updateFromHsl() {
        const h = parseInt(hueInput.value) || 0;
        const s = parseInt(saturationInput.value) || 0;
        const l = parseInt(lightnessInput.value) || 0;
        
        const clampH = (val) => Math.min(360, Math.max(0, val));
        const clampSL = (val) => Math.min(100, Math.max(0, val));
        
        const rgb = hslToRgb(clampH(h), clampSL(s), clampSL(l));
        updateAllFormats(rgb.r, rgb.g, rgb.b);
    }

    // 更新所有格式
    function updateAllFormats(r, g, b) {
        const hex = rgbToHex(r, g, b);
        colorPreview.style.backgroundColor = hex;
        
        hexInput.value = hex;
        colorPicker.value = hex;
        
        redInput.value = r;
        greenInput.value = g;
        blueInput.value = b;
        
        resultHex.value = hex;
        resultRgb.value = `rgb(${r}, ${g}, ${b})`;
        
        const hsl = rgbToHsl(r, g, b);
        resultHsl.value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
        
        hueInput.value = Math.round(hsl.h);
        saturationInput.value = Math.round(hsl.s);
        lightnessInput.value = Math.round(hsl.l);
        
        const hsv = rgbToHsv(r, g, b);
        resultHsv.value = `hsv(${hsv.h}, ${hsv.s}%, ${hsv.v}%)`;
    }

    // RGB 转 HEX
    function rgbToHex(r, g, b) {
        return '#' + [r, g, b].map(x => {
            const hex = x.toString(16);
            return hex.length === 1 ? '0' + hex : hex;
        }).join('');
    }

    // RGB 转 HSL
    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;

        if (max === min) {
            h = s = 0;
        } else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }

        return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    // RGB 转 HSV

            }
            h /= 6;
        }
        
        return { h: Math.round(h * 360), s: Math.round(s * 100), v: Math.round(v * 100) };
    }
