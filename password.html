        </label>

        </label>

        <button class="primary" onclick="generatePasswords()">✨ 生成密码</button>
        <button onclick="copyToClipboard()">📋 复制当前密码</button>
        <button onclick="clearAll()">🗑️ 清空</button>
    </div>

    <div class="example-buttons">
        <button onclick="setPreset('wifi')">📶 WIFI密码</button>
        <button onclick="setPreset('bank')">🏦 银行密码</button>
        <button onclick="setPreset('simple')">🔑 简单好记</button>

        • 点击"复制当前密码"可将主密码复制到剪贴板<br>
        • 支持批量生成多个密码，方便一次性使用<br>
        • 预设选项：WIFI密码(63位复杂)、银行密码(8位数字符号)、简单好记(10位易读)<br>
        • 所有密码在浏览器本地生成，不会上传到服务器

<script>
(function() {
    // DOM 元素
    const passwordDisplay = document.getElementById('passwordDisplay');
    const outputText = document.getElementById('outputText');
    const lengthInput = document.getElementById('length');
    const countInput = document.getElementById('count');
    const uppercaseCheck = document.getElementById('uppercase');
    const lowercaseCheck = document.getElementById('lowercase');
    const numbersCheck = document.getElementById('numbers');
    const symbolsCheck = document.getElementById('symbols');
    const excludeSimilarCheck = document.getElementById('excludeSimilar');
    const noDuplicateCheck = document.getElementById('noDuplicate');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');
    const copySuccess = document.getElementById('copySuccess');

    // 字符集定义
    const CHAR_SETS = {
        uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lowercase: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    };

    // 相似字符 (需要排除的)
    const SIMILAR_CHARS = 'il1Lo0O';

    // 当前生成的主密码
    let currentPassword = 'aB3@eF7#gK2$';

    // 初始化显示
    updateStrengthIndicator(currentPassword);

    // 生成随机密码
    function generatePassword() {
        // 检查至少选择了一种字符类型
        if (!uppercaseCheck.checked && !lowercaseCheck.checked && !numbersCheck.checked && !symbolsCheck.checked) {
            alert('请至少选择一种字符类型');
            return null;
        }

        const length = parseInt(lengthInput.value) || 12;
        const excludeSimilar = excludeSimilarCheck.checked;
        const noDuplicate = noDuplicateCheck.checked;

        // 构建可用字符集
        let availableChars = '';
        if (uppercaseCheck.checked) availableChars += CHAR_SETS.uppercase;
        if (lowercaseCheck.checked) availableChars += CHAR_SETS.lowercase;
        if (numbersCheck.checked) availableChars += CHAR_SETS.numbers;
        if (symbolsCheck.checked) availableChars += CHAR_SETS.symbols;

        // 排除相似字符
        if (excludeSimilar) {
            for (let char of SIMILAR_CHARS) {
                availableChars = availableChars.replace(new RegExp(char, 'g'), '');
            }
        }

        // 检查可用字符是否足够
        if (availableChars.length === 0) {
            alert('可用字符集为空，请调整选项');
            return null;
        }

        // 避免重复字符
        if (noDuplicate && availableChars.length < length) {
            alert('可用字符不足以保证不重复，请增加字符类型或减少长度');
            return null;
        }

        // 生成密码
        let password = '';
        const usedChars = new Set();

        for (let i = 0; i < length; i++) {
            let randomIndex;
            let randomChar;

            if (noDuplicate) {
                // 确保不重复
                do {
                    randomIndex = Math.floor(Math.random() * availableChars.length);
                    randomChar = availableChars[randomIndex];
                } while (usedChars.has(randomChar));
                usedChars.add(randomChar);
            } else {
                randomIndex = Math.floor(Math.random() * availableChars.length);
                randomChar = availableChars[randomIndex];
            }

            password += randomChar;
        }

        return password;
    }

    // 批量生成密码
    function generatePasswords() {
        const count = parseInt(countInput.value) || 5;
        const passwords = [];
        
        for (let i = 0; i < count; i++) {
            const pwd = generatePassword();
            if (pwd) {
                passwords.push(pwd);
                if (i === 0) {
                    // 第一个密码作为主显示
                    currentPassword = pwd;
                    passwordDisplay.textContent = pwd;
                    updateStrengthIndicator(pwd);
                }
            } else {
                break;
            }
        }

        if (passwords.length > 0) {
            outputText.value = passwords.join('\n');
        }
    }

    // 更新密码强度指示器
    function updateStrengthIndicator(password) {
        if (!password) return;

        const length = password.length;
        let strength = 0;
        let hasUpper = /[A-Z]/.test(password);
        let hasLower = /[a-z]/.test(password);
        let hasNumber = /[0-9]/.test(password);
        let hasSymbol = /[^A-Za-z0-9]/.test(password);

        // 计算强度分数 (0-100)
        let charTypes = 0;
        if (hasUpper) charTypes++;
        if (hasLower) charTypes++;
        if (hasNumber) charTypes++;
        if (hasSymbol) charTypes++;

        strength = (length * 4) + (charTypes * 10);
        strength = Math.min(100, strength);

        // 设置进度条
        strengthBar.style.width = strength + '%';
        
        // 设置颜色和文字
        if (strength < 40) {
            strengthBar.style.backgroundColor = '#e74c3c';
            strengthText.textContent = '弱密码';
        } else if (strength < 70) {
            strengthBar.style.backgroundColor = '#f39c12';
            strengthText.textContent = '中密码';
        } else {
            strengthBar.style.backgroundColor = '#27ae60';
            strengthText.textContent = '强密码';
        }
    }

    // 复制到剪贴板
    function copyToClipboard() {
        navigator.clipboard.writeText(currentPassword).then(() => {
            copySuccess.textContent = '✓ 已复制';
            setTimeout(() => {
                copySuccess.textContent = '';
            }, 2000);
        }).catch(err => {
            copySuccess.textContent = '✗ 复制失败';
        });
    }

    // 清空
    function clearAll() {
        passwordDisplay.textContent = '';
        outputText.value = '';
        copySuccess.textContent = '';
    }

    // 预设配置
    function setPreset(type) {
        switch(type) {
            case 'wifi':
                lengthInput.value = 16;
                uppercaseCheck.checked = true;
                lowercaseCheck.checked = true;
                numbersCheck.checked = true;
                symbolsCheck.checked = true;
                excludeSimilarCheck.checked = false;
                noDuplicateCheck.checked = false;
                break;
            case 'bank':
                lengthInput.value = 8;
                uppercaseCheck.checked = true;
                lowercaseCheck.checked = false;
                numbersCheck.checked = true;
                symbolsCheck.checked = true;
                excludeSimilarCheck.checked = true;
                noDuplicateCheck.checked = false;
                break;
            case 'simple':
                lengthInput.value = 10;
                uppercaseCheck.checked = true;
                lowercaseCheck.checked = true;
                numbersCheck.checked = true;
                symbolsCheck.checked = false;
                excludeSimilarCheck.checked = true;
                noDuplicateCheck.checked = false;
                break;
            case 'strong':
                lengthInput.value = 20;
                uppercaseCheck.checked = true;
                lowercaseCheck.checked = true;
                numbersCheck.checked = true;
                symbolsCheck.checked = true;
                excludeSimilarCheck.checked = false;
                noDuplicateCheck.checked = true;
                break;
            case 'pin':
                lengthInput.value = 6;
                uppercaseCheck.checked = false;
                lowercaseCheck.checked = false;
                numbersCheck.checked = true;
                symbolsCheck.checked = false;
                excludeSimilarCheck.checked = false;
                noDuplicateCheck.checked = false;
                break;
        }
        generatePasswords();
    }

    // 暴露全局方法
    window.generatePasswords = generatePasswords;
    window.copyToClipboard = copyToClipboard;
    window.clearAll = clearAll;
    window.setPreset = setPreset;

    // 页面加载后生成默认密码
    window.addEventListener('DOMContentLoaded', () => {
        generatePasswords();
    });

})();
</script>
