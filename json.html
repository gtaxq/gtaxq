<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>JSON 格式化 - gtaxq 工具站</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* 全局盒模型 */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 50px 10px;
    background: #f5f5f5;
}
.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
textarea {
    width: 100%;
    max-width: 100%;
    height: 120px;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 16px;
    resize: vertical;
}
button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}
h1 {
    margin-bottom: 20px;
}
</style>
</head>
  
<body>
<div class="container">
<h1>JSON 格式化/压缩</h1>
<textarea id="input" placeholder="输入 JSON ..."></textarea><br>
<button onclick="formatJSON()">格式化</button>
<button onclick="minifyJSON()">压缩</button>
<button onclick="clearText()">清空</button>
<textarea id="output" placeholder="结果..." readonly></textarea>
</div>

<script>
function formatJSON(){
  try{document.getElementById('output').value=JSON.stringify(JSON.parse(document.getElementById('input').value),null,2);}
  catch(e){document.getElementById('output').value="无效 JSON";}
}
function minifyJSON(){
  try{document.getElementById('output').value=JSON.stringify(JSON.parse(document.getElementById('input').value));}
  catch(e){document.getElementById('output').value="无效 JSON";}
}
function clearText(){document.getElementById('input').value="";document.getElementById('output').value="";}
</script>
</body>
</html>
