<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>XML格式化 - gtaxq 工具站</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* 全局盒模型 — 完全沿用原框架 */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 50px 10px;
    background: #f5f5f5;
}
.container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
textarea {
    width: 100%;
    max-width: 100%;
    height: 200px;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 16px;
    resize: vertical;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: monospace;
    line-height: 1.4;
}
textarea[readonly] {
    background-color: #f0f0f0;
    color: #333;
    cursor: default;
}
button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: #e0e0e0;
    transition: background 0.2s;
}
button:hover {
    background-color: #d0d0d0;
}
button.primary {
    background-color: #4a90e2;
    color: white;
}
button.primary:hover {
    background-color: #357abd;
}
button.success {
    background-color: #27ae60;
    color: white;
}
button.success:hover {
    background-color: #219a52;
}
h1 {
    margin-bottom: 20px;
    font-size: 1.8rem;
}
.actions {
    margin: 15px 0 10px;
}
.note {
    font-size: 0.85rem;
    color: #666;
    margin: 8px 0 5px;
    text-align: left;
    background: #f9f9f9;
    padding: 8px;
    border-radius: 4px;
    max-height: 100px;
    overflow-y: auto;
}
.radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin: 10px 0;
    justify-content: center;
}
.radio-group label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    background: #f2f2f2;
    padding: 6px 15px;
    border-radius: 20px;
}
.radio-group input[type="radio"] {
    margin: 0;
    cursor: pointer;
}
.example-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 10px 0;
}
.example-buttons button {
    padding: 5px 10px;
    font-size: 14px;
    background-color: #f2f2f2;
}
.param-row {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin: 10px 0;
    justify-content: center;
    align-items: center;
}
.param-group {
    display: flex;
    align-items: center;
    gap: 8px;
}
.param-group label {
    font-size: 14px;
}
.param-group input[type="number"] {
    width: 70px;
    padding: 5px;
    font-size: 14px;
}
.error-message {
    color: #e74c3c;
    font-size: 14px;
    text-align: left;
    margin-top: 5px;
    padding: 5px;
    background: #fdeaea;
    border-radius: 4px;
    display: none;
}
.line-numbers {
    position: absolute;
    left: 0;
    top: 0;
    width: 40px;
    padding: 10px 5px;
    text-align: right;
    color: #999;
    background: #f5f5f5;
    border-right: 1px solid #ddd;
    font-family: monospace;
    font-size: 16px;
    line-height: 1.4;
    user-select: none;
    pointer-events: none;
}
.textarea-wrapper {
    position: relative;
    margin-bottom: 10px;
}
.textarea-wrapper textarea {
    padding-left: 45px;
}
</style>
</head>
<body>

<div class="container">
    <h1>📄 XML 格式化</h1>
    
    <!-- 输入区域 -->
    <div class="textarea-wrapper">
        <textarea id="inputText" placeholder="输入需要格式化的 XML 内容...">&lt;?xml version="1.0" encoding="UTF-8"?&gt;
&lt;root&gt;&lt;user id="1"&gt;&lt;name&gt;张三&lt;/name&gt;&lt;email&gt;zhangsan@example.com&lt;/email&gt;&lt;/user&gt;&lt;user id="2"&gt;&lt;name&gt;李四&lt;/name&gt;&lt;email&gt;lisi@example.com&lt;/email&gt;&lt;/user&gt;&lt;/root&gt;</textarea>
    </div>

    <!-- 操作模式选择 -->
    <div class="radio-group">
        <label>
            <input type="radio" name="mode" value="format" checked> 格式化 (美化)
        </label>
        <label>
            <input type="radio" name="mode" value="minify"> 压缩 (最小化)
        </label>
        <label>
            <input type="radio" name="mode" value="validate"> 仅验证
        </label>
    </div>

    <!-- 格式化参数 -->
    <div class="param-row" id="formatParams">
        <div class="param-group">
            <label>缩进空格数:</label>
            <input type="number" id="indentSize" min="1" max="8" value="2">
        </div>
        <div class="param-group">
            <label>
                <input type="checkbox" id="preserveComments" checked> 保留注释
            </label>
        </div>
        <div class="param-group">
            <label>
                <input type="checkbox" id="selfCloseCompact"> 自闭合标签紧凑
            </label>
        </div>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
        <button class="primary" onclick="processXML()">⚡ 执行</button>
        <button onclick="swapText()">⇅ 上下互换</button>
        <button onclick="clearAll()">🗑️ 清空</button>
    </div>

    <!-- 快捷示例按钮 -->
    <div class="example-buttons">
        <button onclick="loadExample('simple')">简单示例</button>
        <button onclick="loadExample('attributes')">带属性</button>
        <button onclick="loadExample('namespace')">命名空间</button>
        <button onclick="loadExample('cdata')">CDATA</button>
        <button onclick="loadExample('comment')">注释示例</button>
    </div>

    <!-- 错误信息显示 -->
    <div id="errorMessage" class="error-message"></div>

    <!-- 输出区域 -->
    <textarea id="outputText" placeholder="格式化后的 XML 会显示在这里..." readonly></textarea>

    <div class="note">
        <strong>📌 说明：</strong><br>
        • 格式化：美化 XML，添加缩进和换行<br>
        • 压缩：移除多余空白，最小化 XML<br>
        • 验证：检查 XML 格式是否正确<br>
        • 支持：处理指令、注释、CDATA、命名空间<br>
        • 注意：本工具使用浏览器内置 DOMParser 进行验证<br>
        • 缩进大小、注释保留等选项可自定义
    </div>
</div>

<script>
(function() {
    // DOM 元素
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const errorMessage = document.getElementById('errorMessage');
    const modeRadios = document.getElementsByName('mode');
    const indentSize = document.getElementById('indentSize');
    const preserveComments = document.getElementById('preserveComments');
    const selfCloseCompact = document.getElementById('selfCloseCompact');
    const formatParams = document.getElementById('formatParams');

    // 监听模式变化，显示/隐藏格式化参数
    modeRadios.forEach(radio => {
        radio.addEventListener('change', () => {
            if (radio.value === 'format' && radio.checked) {
                formatParams.style.display = 'flex';
            } else {
                formatParams.style.display = 'none';
            }
        });
    });

    // XML 格式化函数 (使用递归方式美化)
    function formatXML(xml, indent = 2, preserveComments = true, selfCloseCompact = false) {
        if (!xml || xml.trim() === '') return '';
        
        // 移除多余的空白字符，但保留必要的空格
        let formatted = '';
        let indentLevel = 0;
        let inTag = false;
        let inComment = false;
        let inCDATA = false;
        let inString = false;
        let stringChar = '';
        let buffer = '';
        
        // 预处理：将 > < 之间的内容标准化
        const tokens = xml.split(/(<[^>]*>)/g).filter(t => t !== '');
        
        for (let i = 0; i < tokens.length; i++) {
            let token = tokens[i];
            
            // 处理注释
            if (token.startsWith('<!--')) {
                if (preserveComments) {
                    formatted += '\n' + ' '.repeat(indentLevel * indent) + token;
                } else {
                    // 跳过注释
                }
                continue;
            }
            
            // 处理 CDATA
            if (token.startsWith('<![CDATA[')) {
                formatted += '\n' + ' '.repeat(indentLevel * indent) + token;
                continue;
            }
            
            // 处理处理指令
            if (token.startsWith('<?')) {
                formatted += (formatted ? '\n' : '') + ' '.repeat(indentLevel * indent) + token;
                continue;
            }
            
            // 处理结束标签
            if (token.startsWith('</')) {
                indentLevel--;
                formatted += '\n' + ' '.repeat(indentLevel * indent) + token;
                continue;
            }
            
            // 处理开始标签或自闭合标签
            if (token.startsWith('<')) {
                // 自闭合标签
                if (token.endsWith('/>')) {
                    formatted += '\n' + ' '.repeat(indentLevel * indent) + token;
                } else {
                    // 开始标签
                    formatted += (formatted ? '\n' : '') + ' '.repeat(indentLevel * indent) + token;
                    indentLevel++;
                }
                continue;
            }
            
            // 处理文本内容
            if (token.trim()) {
                // 检查是否全部是空白
                if (token.trim().length > 0) {
                    formatted += '\n' + ' '.repeat(indentLevel * indent) + token.trim();
                }
            }
        }
        
        return formatted.trim();
    }

    // XML 压缩函数 (移除多余空白)
    function minifyXML(xml) {
        if (!xml) return '';
        
        // 移除注释? 默认不移除，但可以通过参数控制
        // 这里简单移除多余空白，但保留必要的空格
        return xml
            .replace(/>\s+</g, '><')  // 移除标签间的空白
            .replace(/\s+</g, '<')    // 移除标签前的空白
            .replace(/>\s+/g, '>')    // 移除标签后的空白
            .trim();
    }

    // 验证 XML
    function validateXML(xml) {
        if (!xml || xml.trim() === '') {
            return { valid: false, error: 'XML 内容为空' };
        }
        
        try {
            const parser = new DOMParser();
            const dom = parser.parseFromString(xml, 'application/xml');
            
            // 检查解析错误
            const parserError = dom.getElementsByTagName('parsererror');
            if (parserError.length > 0) {
                return { 
                    valid: false, 
                    error: parserError[0].textContent || 'XML 格式错误' 
                };
            }
            
            return { valid: true, dom: dom };
        } catch (e) {
            return { valid: false, error: e.message };
        }
    }

    // 核心处理函数
    function processXML() {
        const text = inputText.value;
        if (text === '') {
            outputText.value = '';
            errorMessage.style.display = 'none';
            return;
        }

        // 获取选中的模式
        let mode = 'format';
        for (let radio of modeRadios) {
            if (radio.checked) {
                mode = radio.value;
                break;
            }
        }

        // 隐藏之前的错误信息
        errorMessage.style.display = 'none';
        
        try {
            let result = '';
            
            if (mode === 'validate') {
                // 仅验证模式
                const validation = validateXML(text);
                if (validation.valid) {
                    result = '✓ XML 格式正确\n\n文档结构：\n';
                    // 简单统计
                    const root = validation.dom.documentElement;
                    result += `根元素：${root ? root.tagName : '无'}\n`;
                    
                    // 统计元素数量
                    const elements = validation.dom.getElementsByTagName('*');
                    result += `元素总数：${elements.length}\n`;
                    
                    // 显示前500个字符作为预览
                    if (text.length > 500) {
                        result += `\n内容预览 (前500字符)：\n${text.substring(0, 500)}...`;
                    } else {
                        result += `\n内容预览：\n${text}`;
                    }
                } else {
                    errorMessage.textContent = `❌ 验证失败：${validation.error}`;
                    errorMessage.style.display = 'block';
                    result = 'XML 验证失败，请查看错误信息';
                }
            } 
            else if (mode === 'minify') {
                // 压缩模式
                result = minifyXML(text);
                
                // 验证压缩后的 XML
                const validation = validateXML(result);
                if (!validation.valid) {
                    errorMessage.textContent = `⚠️ 压缩后 XML 可能无效：${validation.error}`;
                    errorMessage.style.display = 'block';
                } else {
                    // 显示压缩统计
                    const originalSize = text.length;
                    const compressedSize = result.length;
                    const ratio = ((1 - compressedSize / originalSize) * 100).toFixed(1);
                    errorMessage.textContent = `✅ 压缩完成：原大小 ${originalSize} 字符，现大小 ${compressedSize} 字符 (压缩 ${ratio}%)`;
                    errorMessage.style.display = 'block';
                    errorMessage.style.backgroundColor = '#e8f5e9';
                    errorMessage.style.color = '#2e7d32';
                }
            } 
            else {
                // 格式化模式
                const indent = parseInt(indentSize.value) || 2;
                const keepComments = preserveComments.checked;
                const compact = selfCloseCompact.checked;
                
                // 先验证原始 XML
                const validation = validateXML(text);
                if (!validation.valid) {
                    errorMessage.textContent = `❌ 无法格式化无效的 XML：${validation.error}`;
                    errorMessage.style.display = 'block';
                    result = 'XML 格式错误，请修正后再格式化';
                } else {
                    result = formatXML(text, indent, keepComments, compact);
                    
                    // 验证格式化后的 XML
                    const postValidation = validateXML(result);
                    if (!postValidation.valid) {
                        errorMessage.textContent = `⚠️ 格式化后 XML 可能无效，请检查`;
                        errorMessage.style.display = 'block';
                    }
                }
            }
            
            outputText.value = result;
        } catch (e) {
            errorMessage.textContent = `处理失败：${e.message}`;
            errorMessage.style.display = 'block';
            outputText.value = '';
        }
    }

    // 交换输入输出
    function swapText() {
        const output = outputText.value;
        if (output && !output.includes('验证失败') && !output.includes('格式错误')) {
            inputText.value = output;
            outputText.value = '';
            errorMessage.style.display = 'none';
        }
    }

    // 清空输入输出
    function clearAll() {
        inputText.value = '';
        outputText.value = '';
        errorMessage.style.display = 'none';
    }

    // 加载示例
    function loadExample(type) {
        switch(type) {
            case 'simple':
                inputText.value = `<?xml version="1.0" encoding="UTF-8"?>
<root><user id="1"><name>张三</name><email>zhangsan@example.com</email></user><user id="2"><name>李四</name><email>lisi@example.com</email></user></root>`;
                break;
            case 'attributes':
                inputText.value = `<?xml version="1.0"?>
<books><book id="b1" category="fiction" lang="en"><title>XML Guide</title><author>John Doe</author><price currency="USD">29.99</price></book><book id="b2" category="tech"><title>Learning XML</title><author>Jane Smith</author><price currency="EUR">34.99</price></book></books>`;
                break;
            case 'namespace':
                inputText.value = `<?xml version="1.0"?>
<root xmlns:h="http://www.w3.org/TR/html4/" xmlns:f="http://www.w3.org/TR/html4/"><h:table><h:tr><h:td>Apples</h:td><h:td>Bananas</h:td></h:tr></h:table><f:table><f:name>African Coffee Table</f:name><f:width>80</f:width><f:length>120</f:length></f:table></root>`;
                break;
            case 'cdata':
                inputText.value = `<?xml version="1.0"?>
<root><content><![CDATA[<p>This is HTML content inside CDATA</p><script>alert('hello');</script>]]></content><description>CDATA example</description></root>`;
                break;
            case 'comment':
                inputText.value = `<?xml version="1.0"?>
<!-- 这是一个XML注释 -->
<root><!-- 用户信息开始 --><user id="1"><name>张三</name><!-- 邮箱地址 --><email>zhangsan@example.com</email></user><!-- 用户信息结束 --></root>`;
                break;
        }
        // 自动执行当前选中的模式
        processXML();
    }

    // 暴露全局方法
    window.processXML = processXML;
    window.swapText = swapText;
    window.clearAll = clearAll;
    window.loadExample = loadExample;

    // 页面加载后执行一次
    window.addEventListener('DOMContentLoaded', () => {
        // 确保有示例内容
        if (!inputText.value.trim()) {
            loadExample('simple');
        } else {
            processXML();
        }
    });

})();
</script>

<!-- 继承原框架风格，增加XML格式化功能 -->
</body>
</html>
