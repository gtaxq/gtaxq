<div class="container">
    <div class="header">
        <h1>📺 M3U8 在线播放器</h1>
        <a href="/">← 返回主页</a>
    </div>
    
    <!-- M3U8 地址输入 -->
    <div class="url-input-row">
        <input type="text" id="m3u8Url" placeholder="输入 M3U8 地址 (例如: https://example.com/playlist.m3u8)" value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">
        <button class="primary" onclick="playM3U8()">▶ 播放</button>
        <button onclick="stopPlayback()">⏹️ 停止</button>
    </div>

    <!-- 示例按钮 -->
    <div class="example-buttons">
        <button onclick="loadExample('bigbuck')">🐰 Big Buck Bunny</button>
        <button onclick="loadExample('apple')">🍎 Apple 测试流</button>
        <button onclick="loadExample('live')">📡 直播示例</button>
        <button onclick="loadExample('4k')">4K 示例</button>
        <button onclick="clearUrl()">🗑️ 清空</button>
    </div>

    <!-- 错误信息显示 -->
    <div id="errorMessage" class="error-message"></div>

    <!-- 视频播放器 -->
    <div class="video-container">
        <video id="my_video_1" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
            <p class="vjs-no-js">您的浏览器不支持 JavaScript 或已被禁用</p>
        </video>
    </div>

    <div class="note">
        <strong>📌 说明：</strong><br>
        • 输入 M3U8 地址，点击播放按钮即可在线播放 HLS 视频流<br>
        • 支持直播流和点播视频，需要 M3U8 地址支持跨域访问<br>
        • 提供多个示例地址供测试使用<br>
        • 基于 Video.js 播放器，支持大多数现代浏览器
    </div>
</div>

<script>
(function() {
    // DOM 元素
    const m3u8Url = document.getElementById('m3u8Url');
    const errorMessage = document.getElementById('errorMessage');
    
    // 播放器实例
    let player = null;

    // 初始化播放器
    function initPlayer() {
        if (!player) {
            player = videojs('my_video_1', {
                controls: true,
                autoplay: false,
                preload: 'auto',
                fluid: false, // 禁用流动布局，使用固定高度
                html5: {
                    hls: {
                        enableLowInitialPlaylist: true,
                        smoothQualityChange: true,
                        overrideNative: true
                    }
                }
            }, function() {
                console.log('播放器初始化成功');
                
                // 监听错误事件
                this.on('error', function() {
                    const error = this.error();
                    if (error) {
                        showError(`播放错误: ${error.message || '未知错误'}`);
                    }
                });
            });
        }
        return player;
    }

    // 播放 M3U8
    function playM3U8() {
        const url = m3u8Url.value.trim();
        
        if (!url) {
            showError('请输入 M3U8 地址');
            return;
        }

        if (!url.startsWith('http://') && !url.startsWith('https://') && !url.startsWith('//')) {
            showError('请输入有效的 HTTP/HTTPS 地址');
            return;
        }

        hideError();

        try {
            // 确保播放器已初始化
            if (!player) {
                initPlayer();
            }
            
            // 先暂停当前播放
            player.pause();
            
            // 设置新源
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            
            // 尝试播放
            player.play().catch(e => {
                console.log('自动播放被阻止:', e);
            });

        } catch (e) {
            showError(`播放失败: ${e.message}`);
        }
    }

    // 停止播放
    function stopPlayback() {
        if (player) {
            player.pause();
            player.src('');
            hideError();
        }
    }

    // 加载示例
    function loadExample(type) {
        let url = '';
        switch(type) {
            case 'bigbuck':
                url = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
                break;
            case 'apple':
                url = 'https://devstreaming-cdn.apple.com/videos/streaming/examples/bipbop_adv_example_fmp4/master.m3u8';
                break;
            case 'live':
                url = 'https://moctobpltc-i.akamaihd.net/hls/live/571329/eight/playlist.m3u8';
                break;
            case '4k':
                url = 'https://devstreaming-cdn.apple.com/videos/streaming/examples/bipbop_adv_example_hevc/master.m3u8';
                break;
        }
        m3u8Url.value = url;
        playM3U8();
    }

    // 清空 URL
    function clearUrl() {
        m3u8Url.value = '';
        stopPlayback();
    }

    // 显示错误
    function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.style.display = 'block';
    }

    // 隐藏错误
    function hideError() {
        errorMessage.style.display = 'none';
    }

    // 暴露全局方法
    window.playM3U8 = playM3U8;
    window.stopPlayback = stopPlayback;
    window.loadExample = loadExample;
    window.clearUrl = clearUrl;

    // 页面加载后初始化播放器
    window.addEventListener('DOMContentLoaded', () => {
        initPlayer();
    });

})();
</script>
