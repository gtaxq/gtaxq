<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MD5 加密 - gtaxq 工具站</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* 全局盒模型 */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 50px 10px;
    background: #f5f5f5;
}
.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
textarea {
    width: 100%;
    max-width: 100%;
    height: 120px;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 16px;
    resize: vertical;
}
button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}
h1 {
    margin-bottom: 20px;
}
</style>
</head>

<body>
<div class="container">
<h1>MD5 加密</h1>
<textarea id="input" placeholder="输入文本..."></textarea><br>
<button onclick="encodeMD5()">生成 MD5</button>
<button onclick="clearText()">清空</button>
<textarea id="output" placeholder="结果..." readonly></textarea>
</div>
<script>
function encodeMD5(){
  const t=document.getElementById('input').value;
  document.getElementById('output').value=md5(t);
}
function clearText(){document.getElementById('input').value="";document.getElementById('output').value="";}
</script>
</body>
</html>
