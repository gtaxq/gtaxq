<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MD5 加密 - gtaxq 工具站</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
<style>body{font-family:Arial;text-align:center;margin:50px;}textarea{width:80%;height:100px;margin:10px 0;padding:10px;font-size:16px;}button{padding:10px 20px;margin:5px;font-size:16px;cursor:pointer;}</style>
</head>
<body>
<h1>MD5 加密</h1>
<textarea id="input" placeholder="输入文本..."></textarea><br>
<button onclick="encodeMD5()">生成 MD5</button>
<button onclick="clearText()">清空</button>
<textarea id="output" placeholder="结果..." readonly></textarea>
<script>
function encodeMD5(){
  const t=document.getElementById('input').value;
  document.getElementById('output').value=md5(t);
}
function clearText(){document.getElementById('input').value="";document.getElementById('output').value="";}
</script>
</body>
</html>
